name: Publish UI Components

on:
  push:
    branches: [master, feature/*, bugfix/*]
  pull_request:
    branches: [master]
  release:
    types: [created]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build-storybook  # Verify Storybook compiles

  publish:
    needs: verify
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/  # Or GitHub Packages
      - run: npm ci
      - run: npm publish
